<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mnemox — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px; min-height: 420px;
      background: #0d0d1a; color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 32px 24px;
    }
    .logo { font-size: 28px; margin-bottom: 6px; }
    h1 { font-size: 20px; font-weight: 700; color: #a78bfa; margin-bottom: 4px; }
    .tagline { font-size: 12px; color: #6b7280; margin-bottom: 28px; text-align: center; }

    .form-group { width: 100%; margin-bottom: 14px; }
    label { font-size: 12px; color: #9ca3af; display: block; margin-bottom: 5px; }
    input {
      width: 100%; padding: 10px 12px;
      background: #1a1a2e; border: 1px solid #374151;
      border-radius: 8px; color: #e5e7eb; font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }

    .btn {
      width: 100%; padding: 11px;
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; margin-bottom: 10px;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent; color: #9ca3af;
      border: 1px solid #374151; font-weight: 400;
    }
    .btn-secondary:hover { border-color: #7c3aed; color: #e5e7eb; }

    .divider {
      width: 100%; display: flex; align-items: center;
      gap: 10px; margin: 16px 0;
      font-size: 11px; color: #4b5563;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #1f2937;
    }

    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px; padding: 8px 12px;
      font-size: 12px; color: #f87171;
      width: 100%; margin-bottom: 14px; display: none;
    }
    .toggle-link {
      font-size: 12px; color: #6b7280; text-align: center; margin-top: 16px;
    }
    .toggle-link span { color: #a78bfa; cursor: pointer; }
    .toggle-link span:hover { text-decoration: underline; }

    .plan-badge {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 600; color: #fff;
      display: inline-block; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="logo">🧠</div>
  <h1>Mnemox</h1>
  <div class="tagline">Your AI memory, everywhere</div>

  <div class="error" id="error-msg"></div>

  <!-- Sign In Form -->
  <div id="signin-form" style="width:100%">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="signin-btn">Sign In</button>
    <div class="toggle-link">
      Don't have an account? <span id="goto-signup">Sign up free</span>
    </div>
  </div>

  <!-- Sign Up Form -->
  <div id="signup-form" style="width:100%; display:none">
    <div class="plan-badge">Free — 50 memories</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 8 characters">
    </div>
    <button class="btn btn-primary" id="signup-btn">Create Free Account</button>
    <div class="toggle-link">
      Already have an account? <span id="goto-signin">Sign in</span>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
