<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mnemox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px; min-height: 380px;
      background: #0d0d1a; color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .logo-row { display: flex; align-items: center; gap: 8px; }
    .logo-text { font-size: 17px; font-weight: 700; color: #a78bfa; }
    .plan-badge {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px; background: #1f2937; color: #9ca3af;
    }
    .plan-badge.plan-pro { background: #4c1d95; color: #c4b5fd; }
    .plan-badge.plan-team { background: #1e3a5f; color: #93c5fd; }
    .user-row {
      font-size: 11px; color: #4b5563; margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .signout-link {
      font-size: 11px; color: #6b7280; cursor: pointer;
      background: none; border: none; padding: 0;
    }
    .signout-link:hover { color: #f87171; }
    .site-badge {
      display: inline-block; background: #1a1a2e;
      border: 1px solid #374151; border-radius: 6px;
      font-size: 12px; padding: 4px 10px; margin-bottom: 14px;
    }
    .stat-box {
      background: #1a1a2e; border-radius: 10px;
      border: 1px solid #1f2937; padding: 12px 16px;
      margin-bottom: 12px; text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 700; color: #a78bfa; }
    .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .limit-notice {
      font-size: 11px; color: #9ca3af; margin-top: 6px; display: none;
    }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid #1f2937;
    }
    .toggle-row:last-of-type { border-bottom: none; }
    .toggle-label { font-size: 13px; }
    .toggle-sub { font-size: 11px; color: #6b7280; }
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #374151; border-radius: 20px; transition: 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider::before { transform: translateX(16px); }
    .toggles-section { margin: 14px 0; }
    .btn {
      width: 100%; padding: 9px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      border: none; margin-bottom: 8px; transition: opacity 0.2s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-upgrade {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-row">
      <span>🧠</span>
      <span class="logo-text">Mnemox</span>
    </div>
    <span class="plan-badge" id="plan-badge">Free</span>
  </div>

  <div class="user-row">
    <span id="user-email" style="color:#6b7280"></span>
    <button class="signout-link" id="signout-btn">Sign out</button>
  </div>

  <div class="site-badge" id="site-badge">Detecting…</div>

  <div class="stat-box">
    <div class="stat-num" id="memory-count">0</div>
    <div class="stat-label">memories saved</div>
    <div class="limit-notice" id="limit-notice"></div>
  </div>

  <div class="toggles-section">
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Capture prompts</div>
        <div class="toggle-sub">Auto-save what you type</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="capture-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">Inject memories</div>
        <div class="toggle-sub">Add context to prompts</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="inject-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="btn btn-primary" id="view-memories-btn">📚 View Memories</button>
  <button class="btn btn-upgrade" id="upgrade-btn" style="display:none">⚡ Upgrade to Pro</button>

  <div id="popup-version" style="font-size:10px;color:#374151;text-align:center;margin-top:10px;">Mnemox</div>

  <script src="popup.js"></script>
</body>
</html>
